version: "3.9"
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    volumes:
      - ./ml/models/saved:/app/models
    depends_on:
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file: ./frontend/.env.local

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
